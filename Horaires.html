<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horaires d'ouverture</title>
  <style>
    :root {
      --couleur-principale: #1D9E75;
      --couleur-creneau-bg: #E1F5EE;
      --couleur-creneau-texte: #085041;
      --couleur-texte: #1a1a1a;
      --couleur-secondaire: #666;
      --couleur-bordure: #e0e0e0;
      --couleur-ferme-bg: #f5f5f5;
      --font: system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: transparent;
      color: var(--couleur-texte);
      padding: 16px;
    }

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
    }

    .week-nav button {
      background: none;
      border: 1px solid var(--couleur-bordure);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--couleur-texte);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .week-nav button:hover { background: #f0f0f0; }

    .week-label {
      font-size: 14px;
      color: var(--couleur-secondaire);
      text-align: center;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    @media (max-width: 560px) {
      .day-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 360px) {
      .day-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .day-card {
      border: 1px solid var(--couleur-bordure);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
      background: #fff;
      min-height: 80px;
    }

    .day-card.today {
      border: 2px solid var(--couleur-principale);
    }

    .day-card.ferme {
      background: var(--couleur-ferme-bg);
    }

    .day-name {
      font-size: 10px;
      color: var(--couleur-secondaire);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }

    .day-num {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--couleur-texte);
    }

    .day-card.today .day-num {
      color: var(--couleur-principale);
    }

    .slot {
      font-size: 10px;
      background: var(--couleur-creneau-bg);
      color: var(--couleur-creneau-texte);
      border-radius: 4px;
      padding: 3px 4px;
      margin: 2px 0;
      line-height: 1.3;
    }

    .ferme-label {
      font-size: 11px;
      color: #aaa;
      font-style: italic;
      margin-top: 4px;
    }

    .status {
      text-align: center;
      padding: 24px;
      font-size: 14px;
      color: var(--couleur-secondaire);
    }

    .status.error {
      color: #c0392b;
      background: #fdf0ef;
      border-radius: 8px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--couleur-secondaire);
      flex-wrap: wrap;
    }

    .legend span { display: flex; align-items: center; gap: 5px; }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="week-nav">
    <button id="prev">&#8592; Sem. précédente</button>
    <span class="week-label" id="week-label"></span>
    <button id="next">Sem. suivante &#8594;</button>
  </div>

  <div id="content">
    <div class="status">Chargement des horaires…</div>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#5DCAA5"></span>Ouvert</span>
    <span><span class="legend-dot" style="background:#e0e0e0"></span>Fermé</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;border:2px solid #1D9E75"></span>Aujourd'hui</span>
  </div>

  <script>
    const WORKER_URL = "https://bitter-tooth-6a80.lea-bouillet.workers.dev";
    const NOMS = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

    let offsetWeek = 0;
    let horairesData = {};

    function getMonday(d) {
      const dt = new Date(d);
      const day = dt.getDay();
      dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
      dt.setHours(0, 0, 0, 0);
      return dt;
    }

    function fmt(d) {
      return d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
    }

    // Convertit "JJ/MM/AAAA" en objet Date
    function parseDate(str) {
      if (!str) return null;
      const [jour, mois, annee] = str.split("/");
      return new Date(annee, mois - 1, jour);
    }

    async function chargerHoraires() {
      try {
        const resp = await fetch(WORKER_URL);

        if (!resp.ok) {
          throw new Error(`Erreur ${resp.status}`);
        }

        const data = await resp.json();

        const aujourd = new Date();
        aujourd.setHours(0, 0, 0, 0);

        const normaux = {};
        const exceptionnels = {};

        for (const rec of data.records) {
          const jour  = rec.fields.Jour;
          const slot  = rec.fields.Horaires;
          const debut = rec.fields.Date_de_debut;
          const fin   = rec.fields.Date_de_fin;

          if (jour === undefined) continue;

          if (!debut && !fin) {
            // Horaire normal (sans dates)
            normaux[jour] = slot || "";
          } else {
            // Horaire exceptionnel (avec dates)
            const debutDate = parseDate(debut);
            const finDate   = parseDate(fin);
            const debutOk = (debutDate === null) || (aujourd >= debutDate);
            const finOk   = (finDate   === null) || (aujourd <= finDate);
            if (debutOk && finOk) {
              exceptionnels[jour] = slot || "";
            }
          }
        }

        horairesData = {};
        for (let j = 0; j <= 6; j++) {
          if (exceptionnels[j] !== undefined) {
            horairesData[j] = exceptionnels[j] ? [exceptionnels[j]] : [];
          } else if (normaux[j]) {
            horairesData[j] = [normaux[j]];
          } else {
            horairesData[j] = [];
          }
        }

        afficher();

      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="status error">⚠️ Impossible de charger les horaires.<br><small>${err.message}</small></div>`;
      }
    }

    function afficher() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const monday = getMonday(today);
      monday.setDate(monday.getDate() + offsetWeek * 7);
      const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);

      document.getElementById("week-label").textContent =
        `Semaine du ${fmt(monday)} au ${fmt(sunday)}`;

      let html = '<div class="day-grid">';

      for (let i = 0; i < 7; i++) {
        const d = new Date(monday); d.setDate(d.getDate() + i);
        const dow = d.getDay();
        const slots = horairesData[dow] || [];
        const isToday = d.getTime() === today.getTime();
        const ouvert = slots.length > 0;

        let classes = "day-card";
        if (isToday) classes += " today";
        if (!ouvert) classes += " ferme";

        html += `<div class="${classes}">`;
        html += `<div class="day-name">${NOMS[dow]}</div>`;
        html += `<div class="day-num">${d.getDate()}</div>`;

        if (ouvert) {
          slots.forEach(s => { html += `<div class="slot">${s}</div>`; });
        } else {
          html += `<div class="ferme-label">Fermé</div>`;
        }

        html += "</div>";
      }

      html += "</div>";
      document.getElementById("content").innerHTML = html;
    }

    document.getElementById("prev").addEventListener("click", () => { offsetWeek--; afficher(); });
    document.getElementById("next").addEventListener("click", () => { offsetWeek++; afficher(); });

    chargerHoraires();
  </script>
</body>
</html>
